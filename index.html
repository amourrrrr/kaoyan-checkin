<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#f0f2f5;--card:#fff;--p:#5b7f6b;--t:#1f2937;--ts:#6b7280}body{font-family:-apple-system,PingFang SC,Microsoft YaHei,sans-serif;background:var(--bg);color:var(--t);line-height:1.5}.ld{min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;position:relative}.ld .lg{font-size:4rem;margin-bottom:8px}.ld h1{font-size:3rem;font-weight:800;color:#fff}.ld p{color:rgba(255,255,255,.8);margin:8px 0 20px;font-size:1.1rem}.ld .bs{display:flex;gap:12px}.ld .bs button{padding:14px 32px;border:none;border-radius:50px;font-size:1rem;font-weight:600;cursor:pointer;transition:.3s;color:#fff}.ld .bs .pp{background:#fff;color:#667eea}.ld .bs .pp:hover{transform:translateY(-2px)}.ld .bs .ss{background:rgba(255,255,255,.15)}.ld .bs .ss:hover{background:rgba(255,255,255,.25)}.gs{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.2);padding:8px 16px;border-radius:50px;color:#fff;text-decoration:none;z-index:10;font-size:.85rem}.gs:hover{background:rgba(255,255,255,.3)}.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}.ov.s{display:flex}.md{background:var(--card);border-radius:16px;padding:28px;width:100%;max-width:360px}.md .mt{display:flex;margin-bottom:20px;background:var(--bg);border-radius:10px;padding:3px}.md .mt button{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;cursor:pointer;color:var(--ts)}.md .mt .aa{background:var(--card);color:var(--t)}.md .fl{margin-bottom:16px}.md .fl label{display:block;font-size:.85rem;color:var(--ts)}.md .fl input{width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:.95rem;outline:none}.md .fl input:focus{border-color:#667eea}.md .sb{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1rem;font-weight:600;cursor:pointer}.md .er{color:red;font-size:.85rem;text-align:center;margin-top:10px}.md .sc{color:green;font-size:.85rem;text-align:center;margin-top:10px}.ah{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--card);border-bottom:1px solid #eee}.ah .ll{font-weight:700}.ah .lo{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;background:transparent}.ah .lo:hover{background:#fee2e2;color:red}.ap{max-width:520px;margin:0 auto;padding:16px}.pc{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:14px;padding:16px 18px;margin-bottom:16px}.ri{width:64px;height:64px;position:relative;flex-shrink:0}.ri svg{transform:rotate(-90deg)}.ri .b{fill:none;stroke:#ddd;stroke-width:6}.ri .f{fill:none;stroke:var(--p);stroke-width:6;stroke-linecap:round}.ri .n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:700;color:var(--p)}.pi{flex:1}.pi h2{font-size:.95rem}.pi p{font-size:.8rem;color:var(--ts);margin-top:2px}.sk{display:inline-block;margin-top:4px;font-size:.76rem;color:var(--p);background:#e8f0ea;padding:2px 10px;border-radius:20px}.tb{display:flex;gap:3px;background:var(--card);padding:3px;border-radius:8px;margin-bottom:14px}.tb button{flex:1;padding:8px;border:none;background:transparent;border-radius:6px;font-size:.85rem;color:var(--ts);cursor:pointer}.tb .on{background:var(--p);color:#fff;font-weight:600}.pn{display:none}.pn.s{display:block}.hl{display:flex;flex-direction:column;gap:6px}.hi{display:flex;align-items:center;gap:10px;background:var(--card);padding:10px 14px;border-radius:10px}.hi .h{display:none}.hi .bx{width:22px;height:22px;border:2px solid #ddd;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}.hi .h:checked+.bx{background:var(--p);border-color:var(--p);color:#fff}.hi .lb{flex:1;font-size:.9rem;cursor:pointer;display:flex;align-items:center;gap:6px}.hi .dl{width:24px;height:24px;border:none;background:transparent;color:#ccc;cursor:pointer}.hi .dl:hover{background:#fbe9e9;color:red}.ad{display:flex;gap:8px;margin-top:10px}.ad input{flex:1;padding:8px 10px;border:2px dashed #ddd;border-radius:8px;font-size:.9rem;outline:none}.ad input:focus{border-color:var(--p)}.ad button{padding:8px 16px;border:none;background:var(--p);color:#fff;border-radius:8px;font-size:.9rem;cursor:pointer}.em{text-align:center;padding:30px;color:var(--ts)}.wg{display:flex;gap:3px}.wd{flex:1;background:var(--card);border-radius:6px;padding:6px 2px;text-align:center}.wd .wn{font-size:.68rem;color:var(--ts)}.wd .wd2{font-size:.7rem;font-weight:600}.wd .wb{height:3px;background:#eee;overflow:hidden;margin:3px 0}.wd .wf{height:100%;background:var(--p)}.wd .wc{font-size:.68rem;color:var(--ts)}.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.mh button{border:none;background:var(--card);width:30px;height:30px;border-radius:50%;cursor:pointer}.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}.cl{text-align:center;font-size:.65rem;color:var(--ts);padding:3px 0}.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:.75rem;background:var(--card)}.yh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.yh button{border:none;background:var(--card);width:30px;height:30px;border-radius:50%;cursor:pointer}.hm{display:grid;grid-template-columns:repeat(53,1fr);gap:2px}.hc{aspect-ratio:1;border-radius:2px;background:#eee;min-width:4px}.hc.l1{background:#cfe3d4}.hc.l2{background:#9ec9a8}.hc.l3{background:#5b8c5a}.hc.l4{background:#2d5a3a}.hml{display:grid;grid-template-columns:repeat(12,1fr);font-size:.5rem;color:var(--ts);margin-bottom:2px}.hs{display:flex;gap:8px;margin-top:6px;font-size:.75rem;color:var(--ts);flex-wrap:wrap}.hg{display:flex;align-items:center;gap:3px;font-size:.65rem;color:var(--ts);justify-content:flex-end;margin-top:3px}.hg .s{width:10px;height:10px;border-radius:2px;background:#eee}.hg .s.l1{background:#cfe3d4}.hg .s.l2{background:#9ec9a8}.hg .s.l3{background:#5b8c5a}.hg .s.l4{background:#2d5a3a}</style></head><body><div class=ld id=ld><div class=lg>📚</div><h1>考研打卡</h1><p>习惯追路</p><div class=bs><button class=pp onclick='sh(1)'>免费开始</button><button class=ss onclick='sh(0)'>登录</button></div><a class=gs href='https://github.com/amourrrrr/kaoyan-checkin' target=_blank>⭐ Star on GitHub</a></div><div class=ov id=ov><div class=md><div class=mt><button class=aa onclick='st(0)'>登录</button><button onclick='st(1)'>注册</button></div><div class=fl><label>用户名</label><input type=text id=au></div><div class=fl><label>密码</label><input type=password id=ap></div><button class=sb onclick='hA()'>登录</button><div id=msg class=er></div></div></div><div style=display:none id=av><div class=ah><span class=ll>📚 考研打卡 <span id=ud style='font-size:.78rem;color:var(--ts);margin-left:6px'></span></span><button class=lo onclick='lO()'>退出</button></div><div class=ap><div class=pc><div class=ri><svg width=64 height=64 viewBox="0 0 64 64"><circle class=b cx=32 cy=32 r=26/><circle class=f id=rf cx=32 cy=32 r=26 stroke-dasharray="0 163.36"/></svg><div class=n id=rc>0/0</div></div><div class=pi><h2 id=pt>添加习惯</h2><p id=pd style='color:var(--ts);font-size:.8rem'>点击下方添加</p><div class=sk id=sk>🔥 0 天</div></div></div><div class=tb><button class=on onclick='sw(0)'>今日</button><button onclick='sw(1)'>本周</button><button onclick='sw(2)'>本月</button><button onclick='sw(3)'>今年</button></div><div class="pn s" id=p0><div class=hl id=hl></div><div class=ad><input id=hi placeholder='添加习惯 ...' maxlength=30><button id=ab>+ 添加</button></div></div><div class=pn id=p1><div class=wg id=wg></div></div><div class=pn id=p2><div class=mh><button onclick='mo--;r2()'>&lt;</button><span id=mt></span><button onclick='mo++;r2()'>&gt;</button></div><div class=cg id=cg></div></div><div class=pn id=p3><div class=yh><button onclick='yo--;r3()'>&lt;</button><span id=yt></span><button onclick='yo++;r3()'>&gt;</button></div><div class=hml id=hml></div><div class=hm id=hm></div><div class=hs id=hs></div><div class=hg>少<span class=s></span><span class="s l1"></span><span class="s l2"></span><span class="s l3"></span><span class="s l4"></span>多</div></div></div></div><script>var U,D,mo=0,yo=0,at=0;var W=["\u65e5", "\u4e00", "\u4e8c", "\u4e09", "\u56db", "\u4e94", "\u516d"];var $=function(x){return document.getElementById(x)};function st(i){at=i;document.querySelectorAll(".mt button").forEach(function(b,j){b.className=i==j?"aa":""});$("msg").innerHTML="";$("msg").className="er"}function sh(i){$("ov").className="ov s";st(i)}function hA(){var u=$("au").value.trim(),p=$("ap").value.trim(),m=$("msg");if(!u||!p){m.innerHTML="请填写整整";m.className="er";return}var us=JSON.parse(localStorage.getItem("ku")||"{}");var hp=p.split("").reduce(function(a,c){return((a<<5)-a)+c.charCodeAt(0)},0);if(at==1){if(us[u]){m.innerHTML="已存在";m.className="er";return}us[u]={h:hp};localStorage.setItem("ku",JSON.stringify(us));m.className="sc";m.innerHTML="成功！";setTimeout(function(){st(0)},1200)}else{if(!us[u]){m.innerHTML="信息错误";m.className="er";return}if(us[u].h!=hp){m.innerHTML="信息错误";m.className="er";return}localStorage.setItem("ks",JSON.stringify({u:u}));$("ov").className="ov";go(u)}}function tK(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}function ld(){try{var x=localStorage.getItem("kd_"+U);if(!x)return{h:[],r:{}};var d=JSON.parse(x);if(!d.h)d.h=[];if(!d.r)d.r={};return d}catch(e){return{h:[],r:{}}}}function sv(d){try{localStorage.setItem("kd_"+U,JSON.stringify(d))}catch(e){}}function ct(r,h,k){var d=r[k]||{},c=0;for(var i=0;i<h.length;i++){if(d[h[i].id])c++}return c}function sr(r,h){if(!h||!h.length)return 0;var tk=tK();if(ct(r,h,tk)<h.length)return 0;var s=1;for(var i=1;i<366;i++){var p=new Date();p.setDate(p.getDate()-i);if(ct(r,h,(p.getFullYear()+"-"+String(p.getMonth()+1).padStart(2,"0")+"-"+String(p.getDate()).padStart(2,"0")))==h.length)s++;else break}return s}function em(n){if(!n)n="";if(n.indexOf("数")>=0||n.indexOf("高")>=0)return"\ud83d\udcd0";if(n.indexOf("英")>=0||n.indexOf("单")>=0)return"\ud83d\udcdd";if(n.indexOf("政")>=0)return"\ud83c\udfdb";return"\ud83d\udcd6"}</script></body></html>
