
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>考研打卡</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#f8f7f4;--card:#fff;--g:#5b8c5a;--d:#3d5a4a;--t:#2c3e2d;--y:#7a8f7e}
  body{font-family:-apple-system,PingFang SC,Microsoft YaHei,sans-serif;background:var(--bg);color:var(--t);line-height:1.5;min-height:100vh;padding:20px 16px 40px}

  .sk{display:inline-block;margin-top:6px;font-size:.78rem;color:var(--g);background:#e8f0ea;padding:2px 10px;border-radius:20px}

  .ad button:hover{background:var(--d)}

  .wg{display:flex;gap:6px}.wdi{flex:1;background:var(--card);border-radius:10px;padding:8px 4px;text-align:center}

  .wdi .wc{font-size:.7rem;color:var(--y)}.wdi.t{background:#e8f0ea}
  .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}

  .mh span{font-size:.95rem;font-weight:600}
  .ca{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cl{text-align:center;font-size:.68rem;color:var(--y);padding:4px 0}
  .cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:.78rem;background:var(--card);gap:2px}
  .cd.t{border:2px solid var(--g);font-weight:700}.cd .cc{font-size:.55rem;color:var(--y)}
  .yh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}

  .yh span{font-size:.95rem;font-weight:600}
  .hgr{display:grid;grid-template-columns:repeat(53,1fr);gap:2px}
  .hc{aspect-ratio:1;border-radius:2px;background:#ddd;min-width:5px}
  .hc.l1{background:#cfe3d4}.hc.l2{background:#9ec9a8}.hc.l3{background:#5b8c5a}.hc.l4{background:#2d5a3a}
  .hml{display:grid;grid-template-columns:repeat(12,1fr);font-size:.55rem;color:var(--y);margin-bottom:3px}
  .hms{display:flex;gap:12px;margin:8px 0 2px;font-size:.78rem;color:var(--y);flex-wrap:wrap}.hms strong{color:var(--t)}
  .hlg{display:flex;align-items:center;gap:3px;font-size:.65rem;color:var(--y);justify-content:flex-end;margin-top:4px}
  .hlg .s{width:10px;height:10px;border-radius:2px;background:#ddd}
  .hlg .s.l1{background:#cfe3d4}.hlg .s.l2{background:#9ec9a8}.hlg .s.l3{background:#5b8c5a}.hlg .s.l4{background:#2d5a3a}
</style></head><body><div class="ap">

<div class="ts"><button class="a" id="t0">今日</button><button id="t1">本周</button><button id="t2">本月</button><button id="t3">今年</button></div>

<div class="pn" id="p1"><div class="wg" id="wg"></div></div>

<div class="pn" id="p3"><div class="yh"><button id="yp">‹</button><span id="yt"></span><button id="yn">›</button></div><div class="hml" id="hml"></div><div class="hgr" id="hgr"></div><div class="hms" id="hms"></div><div class="hlg">少 <span class="s"></span><span class="s l1"></span><span class="s l2"></span><span class="s l3"></span><span class="s l4"></span> 多</div></div>
</div>
<script>
var S="kc",W=["日","一","二","三","四","五","六"];
function fx(n){return(n+"").padStart(2,"0")}function td(){var d=new Date();return d.getFullYear()+"-"+fx(d.getMonth()+1)+"-"+fx(d.getDate())}
function dk(d){return d.getFullYear()+"-"+fx(d.getMonth()+1)+"-"+fx(d.getDate())}

function sv(d){try{localStorage.setItem(S,JSON.stringify(d))}catch(e){}}

function em(n){n=n||"";if(n.indexOf("数")>=0||n.indexOf("高")>=0)return"📐";if(n.indexOf("英")>=0||n.indexOf("单")>=0)return"📝";if(n.indexOf("政")>=0)return"🏛";if(n.indexOf("专")>=0||n.indexOf("据")>=0)return"⚙";if(n.indexOf("代")>=0||n.indexOf("编")>=0)return"💻";if(n.indexOf("阅")>=0||n.indexOf("读")>=0)return"📚";if(n.indexOf("真")>=0)return"📋";return"📖"}
function r0(){var d=new Date();G("dt").textContent=d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日 星期"+W[d.getDay()];var tk=td(),h=g.h,t=h.length,dd=dn(g.r,g.h,tk),cp=2*Math.PI*26;G("rg").setAttribute("stroke-dasharray",(t>0?dd/t*cp:0)+" "+cp);G("ct").textContent=dd+"/"+t;if(t===0){G("tt").textContent="添加你的考研习惯吧 ✨";G("de").textContent="点击下方添加"}else if(dd===t){G("tt").textContent="🎉 今日全部完成";G("de").textContent="太棒了，坚持就是胜利！"}else{G("tt").textContent="今日完成 "+dd+"/"+t;G("de").textContent=dd===0?"开始今天的打卡吧 💪":"还差 "+(t-dd)+" 项，加油！"}var ss=sk(g.r,g.h);G("sk").textContent=ss>0?"🔥 连续 "+ss+" 天":"💪 今天就开始坚持吧";var ls=G("ls");if(h.length===0){ls.innerHTML="<div class=em><div class=be>📝</div><p>还没有习惯，添加一个开始打卡吧</p></div>";return}var m="";for(var i=0;i<h.length;i++){var x=h[i],ck=!!((g.r[tk]||{})[x.id]),hs=0;for(var j=0;j<366;j++){var cc=new Date();cc.setDate(cc.getDate()-j);if((g.r[dk(cc)]||{})[x.id])hs++;else break}var bd=hs>1?"<span style=font-size:.72rem;color:var(--g);background:#e8f0ea;padding:0 8px;border-radius:10px>🔥"+hs+"天</span>":(hs===1?"<span style=font-size:.72rem;color:var(--g);background:#e8f0ea;padding:0 8px;border-radius:10px>新打卡</span>":"");m+="<div class=it><input class=h type=checkbox id=c"+x.id+""+(ck?" checked":"")+"><label class=x for=c"+x.id+">"+(ck?"✓":"")+"</label><label class=nm for=c"+x.id+">"+(x.e||"📖")+" "+x.n+" "+bd+"</label><button class=dl data-i="+x.id+">✕</button></div>"}ls.innerHTML=m;var cbs=ls.querySelectorAll(".h");for(var i=0;i<cbs.length;i++){(function(cb){cb.addEventListener("change",function(){var id=cb.id.slice(1);if(!g.r[td()])g.r[td()]={};if(g.r[td()][id])delete g.r[td()][id];else g.r[td()][id]=true;sv(g);r()})})(cbs[i])}var dls=ls.querySelectorAll(".dl");for(var i=0;i<dls.length;i++){(function(dl){dl.addEventListener("click",function(){if(!confirm("确定要删除吗？记录也会被清除。"))return;var id=dl.getAttribute("data-i");g.h=g.h.filter(function(x){return x.id!==id});for(var k in g.r){delete g.r[k][id];if(Object.keys(g.r[k]).length===0)delete g.r[k]}sv(g);r()})})(dls[i])}}
function r1(){var da=[],t=g.h.length;for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);da.push(d)}var wg=G("wg");if(t===0){wg.innerHTML="<div class=em><div class=be>📊</div><p>添加习惯后显示</p></div>";return}var m="";for(var i=0;i<da.length;i++){var d=da[i],k=dk(d),dd=dn(g.r,g.h,k),rt=dd/t,isT=k===td();m+="<div class=wdi"+(isT?" t":"")+"><div class=wn>"+W[d.getDay()]+"</div><div class=wd2>"+(d.getMonth()+1)+"/"+d.getDate()+"</div><div class=wb><div class=wf style=width:"+(rt*100)+"%></div></div><div class=wc>"+dd+"/"+t+"</div></div>"}wg.innerHTML=m}
function r2(){var n=new Date(),t=new Date(n.getFullYear(),n.getMonth()+mo,1),y=t.getFullYear(),m=t.getMonth();G("mt").textContent=y+"年"+(m+1)+"月";var f=new Date(y,m,1).getDay(),d=new Date(y,m+1,0).getDate(),tl=g.h.length;var h="<div class=cl>日</div><div class=cl>一</div><div class=cl>二</div><div class=cl>三</div><div class=cl>四</div><div class=cl>五</div><div class=cl>六</div>";for(var i=0;i<f;i++)h+="<div class=cd></div>";var tk=td();for(var i=1;i<=d;i++){var k=y+"-"+fx(m+1)+"-"+fx(i),dd=dn(g.r,g.h,k),isT=k===tk;h+="<div class=cd"+(isT?" t":"")+">"+i+(dd>0?"<div class=cc>"+dd+"/"+tl+"</div>":"")+"</div>"}G("ca").innerHTML=h}
function r3(){var n=new Date(),y=n.getFullYear()+yo;G("yt").textContent=y+"年";var ms=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];G("hml").innerHTML=ms.map(function(m,i){return"<span style=grid-column:"+(Math.floor(i*53/12)+1)+">"+m+"</span>"}).join("");var st=new Date(y,0,1),en=new Date(y,11,31),td2=Math.ceil((en-st)/86400000)+1,sw=st.getDay(),th=g.h.length;var c="",cd=0,tc=0,pd=0,bs=0,cs=0;for(var i=0;i<sw;i++)c+="<div class=hc style=background:transparent></div>";for(var d=0;d<td2;d++){var d2=new Date(st);d2.setDate(d2.getDate()+d);var k=dk(d2),dd=dn(g.r,g.h,k);tc+=dd;var lv=0;if(th>0){if(dd===th)lv=4;else if(dd/th>=.75)lv=3;else if(dd/th>=.5)lv=2;else if(dd>0)lv=1}if(dd>0)cd++;if(th>0&&dd===th){pd++;cs++;if(cs>bs)bs=cs}else cs=0;c+="<div class=hc l"+lv+"></div>"}G("hgr").innerHTML=c;G("hms").innerHTML="<span>📅 打卡 <strong>"+cd+"</strong> 天</span><span>✅ 完成 <strong>"+tc+"</strong> 项</span><span>🎯 全勤 <strong>"+pd+"</strong> 天</span><span>🏆 最长连续 <strong>"+bs+"</strong> 天</span>"}

var ti=["t0","t1","t2","t3"],pi=["p0","p1","p2","p3"]
for(var i=0;i<ti.length;i++){(function(idx){G(ti[idx]).onclick=function(){for(var j=0;j<ti.length;j++){G(ti[j]).className="tb";G(pi[j]).className="pn"}this.className="tb a";G(pi[idx]).className="pn s"}})(i)}

r()

</script></body></html>
