<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>习惯打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f2f5;--card:#fff;--p:#5b7f6b;--t:#1f2937;--ts:#6b7280}
body{font-family:-apple-system,PingFang SC,Microsoft YaHei,sans-serif;background:var(--bg);color:var(--t);line-height:1.5}
.ld{min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;position:relative}
.ld .lg{font-size:4rem}.ld h1{font-size:3rem;font-weight:800;color:#fff}.ld p{color:rgba(255,255,255,.8);margin:8px 0 20px}
.ld .bs{display:flex;gap:12px}.ld .bs button{padding:14px 32px;border:none;border-radius:50px;font-size:1rem;font-weight:600;cursor:pointer;transition:.3s;color:#fff}
.ld .bs .p1{background:#fff;color:#667eea}.ld .bs .p1:hover{transform:translateY(-2px)}.ld .bs .p2{background:rgba(255,255,255,.15)}.ld .bs .p2:hover{background:rgba(255,255,255,.25)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}.ov.s{display:flex}
.md{background:var(--card);border-radius:16px;padding:28px;width:100%;max-width:360px}.md .mt{display:flex;margin-bottom:20px;background:var(--bg);border-radius:10px;padding:3px}
.md .mt button{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;cursor:pointer;color:var(--ts)}.md .mt .a1{background:var(--card);color:var(--t)}
.md .fl{margin-bottom:16px}.md .fl label{display:block;font-size:.85rem;color:var(--ts)}.md .fl input{width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:.95rem;outline:none}
.md .fl input:focus{border-color:#667eea}.md .sb{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:1rem;font-weight:600;cursor:pointer}
.md .er{color:red;font-size:.85rem;text-align:center;margin-top:10px}.md .sc{color:green;font-size:.85rem;text-align:center;margin-top:10px}
.ah{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--card);border-bottom:1px solid #eee}
.ap{max-width:520px;margin:0 auto;padding:16px}
.pc{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:14px;padding:16px;margin-bottom:16px}
.ri{width:64px;height:64px;position:relative;flex-shrink:0}.ri svg{transform:rotate(-90deg)}
.ri .b{fill:none;stroke:#ddd;stroke-width:6}.ri .f{fill:none;stroke:var(--p);stroke-width:6;stroke-linecap:round}
.ri .n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:700;color:var(--p)}
.pi{flex:1}.pi h2{font-size:.95rem}.pi p{font-size:.8rem;color:var(--ts);margin-top:2px}
.sk{display:inline-block;margin-top:4px;font-size:.76rem;color:var(--p);background:#e8f0ea;padding:2px 10px;border-radius:20px}
.tb{display:flex;gap:3px;background:var(--card);padding:3px;border-radius:8px;margin-bottom:14px}
.tb button{flex:1;padding:8px;border:none;background:transparent;border-radius:6px;font-size:.85rem;color:var(--ts);cursor:pointer}.tb .on{background:var(--p);color:#fff;font-weight:600}
.pn{display:none}.pn.s{display:block}.hl{display:flex;flex-direction:column;gap:6px}
.hi{display:flex;align-items:center;gap:10px;background:var(--card);padding:10px 14px;border-radius:10px}
.hi .h{display:none}.hi .bx{width:22px;height:22px;border:2px solid #ddd;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.hi .h:checked+.bx{background:var(--p);border-color:var(--p);color:#fff}
.hi .lb{flex:1;font-size:.9rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.hi .dl{width:24px;height:24px;border:none;background:transparent;color:#ccc;cursor:pointer}.hi .dl:hover{background:#fbe9e9;color:red}
.ad{display:flex;gap:8px;margin-top:10px}.ad input{flex:1;padding:8px 10px;border:2px dashed #ddd;border-radius:8px;font-size:.9rem;outline:none}
.ad input:focus{border-color:var(--p)}.ad button{padding:8px 16px;border:none;background:var(--p);color:#fff;border-radius:8px;font-size:.9rem;cursor:pointer}
.em{text-align:center;padding:30px;color:var(--ts)}
.wg{display:flex;gap:3px}.wd{flex:1;background:var(--card);border-radius:6px;padding:6px 2px;text-align:center}
.wd .wn{font-size:.68rem;color:var(--ts)}.wd .wd2{font-size:.7rem;font-weight:600}.wd .wb{height:3px;background:#eee;overflow:hidden;margin:3px 0}.wd .wf{height:100%;background:var(--p)}.wd .wc{font-size:.68rem;color:var(--ts)}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.mh button{border:none;background:var(--card);width:30px;height:30px;border-radius:50%;cursor:pointer}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cl{text-align:center;font-size:.65rem;color:var(--ts);padding:3px 0}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:.72rem;background:var(--card);flex-direction:column}
.cd .cn{font-size:.75rem;font-weight:600}.cd .ck{font-size:.5rem;color:var(--p)}
.yh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.yh button{border:none;background:var(--card);width:30px;height:30px;border-radius:50%;cursor:pointer}
.hm{display:grid;grid-template-columns:repeat(53,1fr);gap:2px}.hc{aspect-ratio:1;border-radius:2px;background:#eee;min-width:4px}
.hc.l1{background:#cfe3d4}.hc.l2{background:#9ec9a8}.hc.l3{background:#5b8c5a}.hc.l4{background:#2d5a3a}
.hml{display:grid;grid-template-columns:repeat(12,1fr);font-size:.5rem;color:var(--ts);margin-bottom:2px}
.hs{display:flex;gap:8px;margin-top:6px;font-size:.72rem;color:var(--ts);flex-wrap:wrap}
.hg{display:flex;align-items:center;gap:3px;font-size:.65rem;color:var(--ts);justify-content:flex-end;margin-top:3px}
.hg .s{width:10px;height:10px;border-radius:2px;background:#eee}.hg .s.l1{background:#cfe3d4}.hg .s.l2{background:#9ec9a8}.hg .s.l3{background:#5b8c5a}.hg .s.l4{background:#2d5a3a}

/* ===== Enhanced ===== */
@keyframes gb{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.ld{background:linear-gradient(135deg,#667eea,#764ba2,#5b6abf);background-size:200% 200%;animation:gb 15s ease infinite}
@keyframes bi{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ld .lg{animation:bi 2s ease infinite}
@keyframes si{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-color-scheme:dark){
:root{--bg:#1a1a2e;--card:#16213e;--t:#e0e0e0;--ts:#8899aa;--p:#7bc67e}
body{background:var(--bg)}}
.pc{transition:all .3s}.pc:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
.hi{transition:all .2s;animation:si .3s both}.hi:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);transform:translateY(-1px)}
.hi .bx{transition:all .2s}.hi .bx:hover{border-color:var(--p);transform:scale(1.08)}
.tb{box-shadow:0 1px 6px rgba(0,0,0,.06)}.tb button{transition:all .2s}.tb button:hover{color:var(--p);opacity:.8}
.pn{animation:fi .3s ease}
.wd{transition:all .2s}.wd:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);transform:translateY(-2px)}
.wd .wf{transition:width .5s ease}
.cd{transition:all .2s}.cd:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);transform:scale(1.05)}
.hc{transition:all .2s}.hc:hover{transform:scale(1.4);z-index:1}
.ad button{transition:all .2s}.ad button:active{transform:scale(.95)}</style></head><body>
<div class=ld id=ld><div class=lg>📚</div><h1>习惯打卡</h1><p>习惯追踪 · 每天进步</p>
<div class=bs><button class=p1 onclick="sh(1)">免费开始</button><button class=p2 onclick="sh(0)">登录</button></div></div>
<div class=ov id=ov><div class=md><div class=mt><button class=a1 onclick="st(0)">登录</button><button onclick="st(1)">注册</button></div>
<div class=fl><label>用户名</label><input type=text id=au></div><div class=fl><label>密码</label><input type=password id=ap></div>
<button class=sb onclick="hA()">登录</button><div id=msg class=er></div></div></div>
<div style=display:none id=av><div class=ah><span class=ll>📚 习惯打卡 <span id=ud style='font-size:.78rem;color:var(--ts)'></span></span></div>
<div class=ap><div class=pc><div class=ri><svg width=64 height=64 viewBox='0 0 64 64'><circle class=b cx=32 cy=32 r=26/><circle class=f id=rf cx=32 cy=32 r=26 stroke-dasharray='0 163.36'/></svg><div class=n id=rc>0/0</div></div>
<div class=pi><h2 id=pt>今日还没有打卡</h2><p id=pd style='color:var(--ts);font-size:.8rem'>添加你的习惯吧</p><div class=sk id=sk>🔥 连续 0 天</div></div></div>
<div class=tb><button class=on onclick="sw(0)">今日</button><button onclick="sw(1)">本周</button><button onclick="sw(2)">本月</button><button onclick="sw(3)">今年</button></div>
<div class='pn s' id=p0><div class=hl id=hl></div><div class=ad><input id=hi placeholder='添加习惯 ...' maxlength=30><button id=ab>+ 添加</button></div></div>
<div class=pn id=p1><div class=wg id=wg></div></div>
<div class=pn id=p2><div class=mh><button onclick="mo--;r2()">‹</button><span id=mt></span><button onclick="mo++;r2()">›</button></div><div class=cg id=cg></div></div>
<div class=pn id=p3><div class=yh><button onclick="yo--;r3()">‹</button><span id=yt></span><button onclick="yo++;r3()">›</button></div><div class=hml id=hml></div><div class=hm id=hm></div><div class=hs id=hs></div><div class=hg>少<span class=s></span><span class='s l1'></span><span class='s l2'></span><span class='s l3'></span><span class='s l4'></span>多</div></div></div></div>
<script>
var U,D,mo=0,yo=0,at=0
var $=function(x){return document.getElementById(x)}
var W=['日','一','二','三','四','五','六']
function st(i){at=i;document.querySelectorAll('.mt button').forEach(function(b,j){b.className=i==j?'a1':''});$('msg').innerHTML='';$('msg').className='er'}
function sh(i){$('ov').className='ov s';st(i)}
function hA(){var u=$('au').value.trim(),p=$('ap').value.trim(),m=$('msg');if(!u||!p){m.innerHTML='请填写完整';m.className='er';return}
var us=JSON.parse(localStorage.getItem('ku')||'{}');var hp=p.split('').reduce(function(a,c){return((a<<5)-a)+c.charCodeAt(0)},0)
if(at==1){if(us[u]){m.innerHTML='已存在';return}us[u]={h:hp};localStorage.setItem('ku',JSON.stringify(us));m.className='sc';m.innerHTML='成功！';setTimeout(function(){st(0)},1200)}
else{if(!us[u]){m.innerHTML='信息错误';m.className='er';setTimeout(function(){$('ov').className='ov'},1500);return}if(us[u].h!=hp){m.innerHTML='信息错误';m.className='er';return}localStorage.setItem('ks',JSON.stringify({u:u}));$('ov').className='ov';go(u)}}
function tK(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dK(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function ld(){try{var x=localStorage.getItem('kd_'+U);if(!x)return{h:[],r:{}};var d=JSON.parse(x);if(!d.h)d.h=[];if(!d.r)d.r={};return d}catch(e){return{h:[],r:{}}}}
function sv(d){try{localStorage.setItem('kd_'+U,JSON.stringify(d))}catch(e){}}
function ct(r,h,k){var d=r[k]||{},c=0;for(var i=0;i<h.length;i++){if(d[h[i].id])c++}return c}
function sr(r,h){if(!h||!h.length)return 0;var tk=tK();if(ct(r,h,tk)<h.length)return 0;var s=1;for(var i=1;i<366;i++){var p=new Date();p.setDate(p.getDate()-i);if(ct(r,h,dK(p))==h.length)s++;else break}return s}
function em(n){if(!n)n='';if(n.indexOf('数')>=0||n.indexOf('高')>=0)return'📐';if(n.indexOf('英')>=0||n.indexOf('单')>=0)return'📝';return'📖'}
function r0(){var h=D.h,t=h.length,tk=tK(),dc=ct(D.r,h,tk),cp=2*Math.PI*26;$('rf').setAttribute('stroke-dasharray',(t>0?dc/t*cp:0)+' '+cp);$('rc').innerHTML=dc+'/'+t
if(t==0){$('pt').innerHTML='添加你的习惯吧';$('pd').innerHTML='点击下方添加'}
else if(dc==t){$('pt').innerHTML='全部完成！';$('pd').innerHTML='太棒了！'}
else{$('pt').innerHTML='今日 '+dc+'/'+t;$('pd').innerHTML=dc?'还差 '+(t-dc)+' 项':'开始吧'}
var sk=sr(D.r,h);$('sk').innerHTML=sk>0?'🔥 连续 '+sk+' 天':'💪 开始吧'
var l=$('hl');if(h.length==0){l.innerHTML='<div class=em>还没有习惯，点击下方添加</div>';return}
var hh='',tk2=tK()
for(var i=0;i<h.length;i++){var x=h[i],ch=!!((D.r[tk2]||{})[x.id]),hs=0
for(var j=0;j<366;j++){var cc=new Date();cc.setDate(cc.getDate()-j);if((D.r[dK(cc)]||{})[x.id])hs++;else break}
var bd=hs>1?' <span class=sk>🔥'+hs+'天</span>':(hs==1?' <span class=sk>新</span>':'')
var ak=ch?' checked':''
hh+='<div class=hi><input class=h type=checkbox id=\'z'+x.id+'\''+ak+'><label class=bx for=\'z'+x.id+'\'>'+(ch?'✓':'')+'</label><label class=lb for=\'z'+x.id+'\'>'+(x.e||'📖')+' '+x.n+bd+'</label></div>'}
l.innerHTML=hh
l.querySelectorAll('.h').forEach(function(c){c.onchange=function(){var id=this.id.replace('z',''),tk=tK();if(!D.r[tk])D.r[tk]={};if(D.r[tk][id])delete D.r[tk][id];else D.r[tk][id]=true;sv(D);ra()}})}
function r1(){var da=[];for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);da.push(d)}var t=D.h.length,w=$('wg');if(t==0){w.innerHTML='<div class=em>添加习惯后显示</div>';return}var m='';for(var i=0;i<da.length;i++){var d=da[i],k=dK(d),dc=ct(D.r,D.h,k),rt=dc/t,isT=k==tK();m+='<div class=wd'+(isT?' today':'')+'><div class=wn>'+W[d.getDay()]+'</div><div class=wd2>'+(d.getMonth()+1)+'/'+d.getDate()+'</div><div class=wb><div class=wf style=width:'+(rt*100)+'%></div></div><div class=wc>'+dc+'/'+t+'</div></div>'}w.innerHTML=m}
function r2(){var n=new Date(),t=new Date(n.getFullYear(),n.getMonth()+mo,1),y=t.getFullYear(),m=t.getMonth();$('mt').innerHTML=y+'年'+(m+1)+'月';var f=new Date(y,m,1).getDay(),d=new Date(y,m+1,0).getDate(),tl=D.h.length;var hh='<div class=cl>日</div><div class=cl>一</div><div class=cl>二</div><div class=cl>三</div><div class=cl>四</div><div class=cl>五</div><div class=cl>六</div>';for(var i=0;i<f;i++)hh+='<div class=cd></div>';for(var i=1;i<=d;i++){var k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(i).padStart(2,'0'),dc=ct(D.r,D.h,k);hh+='<div class=cd><span class=cn>'+i+'</span>'+(dc>0?'<span class=ck>✓</span>':'')+'</div>'}$('cg').innerHTML=hh}
function r3(){var y=new Date().getFullYear()+yo;$('yt').innerHTML=y+'年';$('hml').innerHTML=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'].map(function(m,i){return'<span style=grid-column:'+(Math.floor(i*53/12)+1)+'>'+m+'</span>'}).join('');var st=new Date(y,0,1),en=new Date(y,11,31),td2=Math.ceil((en-st)/86400000)+1,sw=st.getDay(),th=D.h.length;var c='',cd=0,tc=0,pd=0,bs=0,cs=0;for(var i=0;i<sw;i++)c+='<div class=hc style=background:transparent></div>';for(var d=0;d<td2;d++){var d2=new Date(st);d2.setDate(d2.getDate()+d);var k=dK(d2),dc=ct(D.r,D.h,k);tc+=dc;var lv=0;if(th>0){if(dc==th)lv=4;else if(dc/th>=.75)lv=3;else if(dc/th>=.5)lv=2;else if(dc>0)lv=1}if(dc>0)cd++;if(th>0&&dc==th){pd++;cs++;if(cs>bs)bs=cs}else cs=0;c+='<div class=\'hc l'+lv+'\'></div>'}
$('hm').innerHTML=c;$('hs').innerHTML='📅 打卡 '+cd+' 天  ✅ 完成 '+tc+' 项  🎯 全勤 '+pd+' 天  🏆 最长 '+bs+' 天'}
function sw(i){document.querySelectorAll('.tb button').forEach(function(b){b.className=''});document.querySelectorAll('.pn').forEach(function(p){p.className='pn'});document.querySelectorAll('.tb button')[i].className='on';document.querySelectorAll('.pn')[i].className='pn s';if(i==1)r1();if(i==2)r2();if(i==3)r3()}
$('ab').onclick=function(){var ip=$('hi'),n=ip.value.trim();if(!n){alert('请输入');return}if(n.length>30){alert('太长');return}for(var i=0;i<D.h.length;i++){if(D.h[i].n==n){alert('已存在');return}}var id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);D.h.push({id:id,n:n,e:em(n)});sv(D);ip.value='';ra()}
$('hi').onkeydown=function(e){if(e.keyCode==13){e.preventDefault();$('ab').click()}};$('ap').onkeydown=function(e){if(e.keyCode==13)hA()};$('ov').onclick=function(e){if(e.target==this)this.className='ov'}
function ra(){r0();r1();r2();r3()}
function go(u){U=u;D=ld();$('ld').style.display='none';$('av').style.display='block';$('ud').innerHTML='👤 '+u;ra()}
function lO(){localStorage.removeItem('ks');U=null;D=null;$('av').style.display='none';$('ld').style.display='flex'}
function lt(){localStorage.removeItem('ks');U=null;D=null;$('av').style.display='none';$('ld').style.display='flex'}
try{var s=JSON.parse(localStorage.getItem('ks')||'null');if(s&&s.u)go(s.u)}catch(e){}
if(navigator.serviceWorker){navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++){r[i].unregister()}}).catch(function(){})}
</script></body></html>
